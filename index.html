<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Blaze – Cálculo de Cashback</title>
<style>
body {
font-family: Arial, sans-serif;
background: #ffffff;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
}
.box {
width: 100%;
max-width: 480px;
border: 2px solid #e10600;
border-radius: 10px;
padding: 24px;
box-shadow: 0 0 12px rgba(0,0,0,0.1);
text-align: center;
overflow-y: auto;
max-height: 95vh;
}
h2 { color: #e10600; }
input, textarea {
width: 100%;
padding: 10px;
margin-bottom: 10px;
border-radius: 6px;
border: 1px solid #ccc;
}
button {
width: 100%;
padding: 12px;
margin: 5px 0;
border: none;
border-radius: 6px;
background: #e10600;
color: #fff;
font-weight: bold;
cursor: pointer;
}
button:hover { background: #b00500; }
pre {
background: #f7f7f7;
padding: 15px;
white-space: pre-wrap;
text-align: left;
font-size: 13px;
border: 1px solid #ddd;
margin-top: 10px;
}
</style>
</head>
<body>

<div class="box" id="app"></div>

<script>
const app = document.getElementById("app");

function tela(c) { app.innerHTML = c; }

/* MENU (sem título) */
function menu() {
tela(`
<button onclick="cashback()">🧮 Cálculo Cashback</button>
`);
}

/* TELA CASHBACK */
function cashback() {
tela(`
<h2>Cálculo de Cashback</h2>

<textarea id="inputAuto" placeholder="Cole aqui os dados do sistema"></textarea>
<button onclick="autoPreencher()">⚡ Preencher automático</button>

<input id="porcentagem" type="number" value="5" placeholder="Porcentagem (%)">
<input id="real_bet" type="number" placeholder="Total apostado">
<input id="real_won" type="number" placeholder="Total ganho">
<input id="last_week_cb" type="number" placeholder="Cashback anterior">
<input id="spins" type="number" placeholder="Giros grátis">
<input id="sell" type="number" placeholder="Recompensas">
<input id="trans" type="number" placeholder="Bônus convertidos">
<input id="rake" type="number" placeholder="Rakeback">

<button onclick="gerar()">Gerar cálculo</button>

<div id="res"></div>
`);
}

/* AUTO PREENCHIMENTO */
function autoPreencher() {
const texto = document.getElementById("inputAuto").value;

// 🔥 pegar porcentagem automática
const matchPercent = texto.trim().match(/^([0-9\.]+)/);
if (matchPercent) {
  const valor = parseFloat(matchPercent[1]);
  document.getElementById("porcentagem").value = (valor * 100).toFixed(0);
}

function pegar(campo) {
const r = new RegExp(campo + "\\s*=\\s*([0-9\\.]+)");
const m = texto.match(r);
return m ? parseFloat(m[1]) : 0;
}

document.getElementById("real_bet").value = pegar("real_bet");
document.getElementById("real_won").value = pegar("real_won");
document.getElementById("sell").value = pegar("sell_amount");
document.getElementById("trans").value = pegar("transfer_amount");
document.getElementById("last_week_cb").value = pegar("last_week_cashback");
document.getElementById("spins").value = pegar("softswiss_free_spins_amount");
document.getElementById("rake").value = pegar("rakeback_reward_amount");

gerar();
}

/* CÁLCULO */
function gerar() {
const p = parseFloat(document.getElementById("porcentagem").value || 0);
const bet = parseFloat(document.getElementById("real_bet").value || 0);
const won = parseFloat(document.getElementById("real_won").value || 0);
const last = parseFloat(document.getElementById("last_week_cb").value || 0);
const spins = parseFloat(document.getElementById("spins").value || 0);
const sell = parseFloat(document.getElementById("sell").value || 0);
const trans = parseFloat(document.getElementById("trans").value || 0);
const rake = parseFloat(document.getElementById("rake").value || 0);

const extras = last + spins + sell + trans + rake;
const total = won + extras;
const perda = bet - total;
const cashback = perda > 0 ? perda * (p / 100) : 0;

const texto = `O cashback semanal é calculado com base na diferença entre seus ganhos e perdas durante o período, e não sobre o total apostado.

Vamos aos seus valores:

• Total apostado: BRL ${bet.toFixed(2)}  
• Total ganho: BRL ${won.toFixed(2)}  

Outros valores considerados:  
• Cashback anterior: BRL ${last.toFixed(2)}  
• Giros grátis: BRL ${spins.toFixed(2)}  
• Recompensas: BRL ${sell.toFixed(2)}  
• Bônus convertidos: BRL ${trans.toFixed(2)}  
• Rakeback: BRL ${rake.toFixed(2)}  

Total de ganhos considerados: BRL ${total.toFixed(2)}  

Diferença (perdas): BRL ${perda.toFixed(2)}  

Seu cashback (${p}%): BRL ${cashback.toFixed(2)}  

Esse é o valor final disponível para você nesta semana.

Para mais detalhes sobre o cálculo:
https://support.blaze-help.com/hc/pt-br/articles/360007716017-Como-funciona-o-cashback-reembolso`;

document.getElementById("res").innerHTML =
`<pre id="txt">${texto}</pre>
<button id="btnCopiar" onclick="copiar()">Copiar</button>`;
}

/* COPIAR SEM POPUP */
function copiar() {
const t = document.getElementById("txt").innerText;
navigator.clipboard.writeText(t);

const btn = document.getElementById("btnCopiar");
btn.innerText = "✅ Copiado!";
btn.style.background = "#28a745";

setTimeout(() => {
  btn.innerText = "Copiar";
  btn.style.background = "#e10600";
}, 2000);
}

/* INICIAR */
menu();
</script>

</body>
</html>
